<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Dashboard</title>

  <!-- Inter typeface: variable weight, loaded once, used everywhere -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <!-- Page header: just today's date. Filled in by app.js. -->
    <header class="page-header">
      <h1 class="page-header__date" id="header-date"></h1>
    </header>

    <!--
      Overview card: Weather + Clock side by side.
      Two mount points (weather-content / clock-content) inside one
      card, matching the mockup's single combined header line.
    -->
    <section class="card overview-card" aria-label="Weather and time">
      <div class="card__body">
        <div id="weather-content">
          <p class="card__empty">Loading weather…</p>
        </div>
        <div id="clock-content"></div>
      </div>
    </section>

    <!-- Future cards (Shopping, Today, Chores, Dinner, Deliveries)
         will each be added here as their own <section class="card">,
         one feature at a time. -->
  </main>

  <script src="js/app.js"></script>
</body>
</html>
