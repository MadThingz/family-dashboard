<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zublow Family</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="page">

    <!-- Page header -->
    <header class="page-header">
      <h1 class="page-header__date" id="header-date"></h1>
    </header>

    <!-- Weather + Clock card -->
    <section class="card overview-card" aria-label="Weather and time">
      <div class="card__body">
        <div id="weather-content">
          <p class="card__empty">Loading weather…</p>
        </div>
        <div id="clock-content"></div>
      </div>
    </section>

    <!-- Shopping List card -->
    <section class="card">
      <div class="card__header">
        <span class="card__icon">🛒</span>
        <h2 class="card__title">Shopping List</h2>
      </div>
      <div class="card__body" id="shopping-list">
        <p class="card__empty">Loading shopping list…</p>
      </div>
    </section>

    <!-- Tide Times card -->
    <section class="card">
      <div class="card__header">
        <span class="card__icon">🌊</span>
        <h2 class="card__title">Tide Times</h2>
      </div>
      <div class="card__body" id="tides-list">
        <p class="card__empty">Loading tide times…</p>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
